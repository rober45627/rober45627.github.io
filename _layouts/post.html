---
layout: default
---
<div class="post-content">
  <a class="back-link" href="/">← Back</a>
  <div class="post-header">
    <p class="post-date" style="view-transition-name: date-1">{{ page.date | date: "%e %b %Y" }}</p>
    <p class="post-title" style="view-transition-name: title-1">{{ page.title }}</p>
  </div>
  <div class="post-body">
    {{ content }}
  </div>
</div>
