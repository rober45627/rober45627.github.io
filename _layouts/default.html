<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a class="site-title" href="/">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="/">Writing</a>
        <a href="/about">About</a>
      </nav>
    </header>
    {{ content }}
    <footer>now is the winter of our discontent made glorious summer</footer>
  </div>
</body>
</html>

<script>
  document.querySelectorAll('.post-item').forEach(item => {
    item.addEventListener('click', function(e) {
      const link = this.querySelector('a.post-title');
      if (!link) return;
      e.preventDefault();

      const rect = this.getBoundingClientRect();

      const box = document.createElement('div');
      box.style.position = 'fixed';
      box.style.top = rect.top + 'px';
      box.style.left = rect.left + 'px';
      box.style.width = rect.width + 'px';
      box.style.height = rect.height + 'px';
      box.style.background = '#F9F6F0';
      box.style.zIndex = '1000';
      box.style.transition = 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
      box.style.borderRadius = '2px';
      document.body.appendChild(box);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          box.style.top = '0';
          box.style.left = '0';
          box.style.width = '100vw';
          box.style.height = '100vh';
          box.style.borderRadius = '0';
        });
      });

      setTimeout(() => window.location.href = link.href, 520);
    });
  });
</script>
