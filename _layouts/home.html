---
layout: default
---
<div style="text-align: center; margin-bottom: 2.5rem;">
  <img src="/assets/images/MGS.jpg" alt="Your Name" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover;">
</div>
<div class="post-list">
  {% for post in site.posts %}
  <div class="post-item">
    <p class="post-date">{{ post.date | date: "%e %b %Y" }}</p>
    <a class="post-title" href="{{ post.url }}">{{ post.title }}</a>
    <p class="post-excerpt">{{ post.excerpt | strip_html | truncatewords: 40 }}</p>
    <a class="read-more" href="{{ post.url }}">Read more →</a>
  </div>
  {% endfor %}
</div>
